<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinalize! - Flashcards de Libras</title>
    <style>
        /* ==========================================================================
           1. VARIÁVEIS DE COR E TEMA (Paleta Sinalize!)
           ========================================================================== */
        :root {
            /* Brand */
            --teal-main: #0d9488;
            --teal-dark: #0f766e;
            --teal-light: #f0fdfa;
            --amber-accent: #f59e0b;
            
            /* Neutros */
            --bg-offwhite: #fafaf9;
            --text-main: #292524;
            --text-secondary: #4b5563;
            --text-tertiary: #9ca3af;
            --card-bg: #ffffff;
            
            /* Sombras e Transições */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition-speed: 0.6s;
        }

        /* ==========================================================================
           2. RESET E TIPOGRAFIA
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-offwhite);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        h1 {
            color: var(--teal-dark);
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }

        /* ==========================================================================
           3. CONTROLES DA INTERFACE (Toggle e Navegação)
           ========================================================================== */
        .controls-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 600px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            padding: 0.5rem;
            border-radius: 9999px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--text-tertiary);
        }

        .toggle-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 9999px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .toggle-btn.active {
            background: var(--teal-main);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 1.5rem;
        }

        .btn-nav {
            background-color: var(--card-bg);
            color: var(--teal-main);
            border: 2px solid var(--teal-main);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-nav:hover {
            background-color: var(--teal-light);
        }

        /* ==========================================================================
           4. FLASHCARD (Estrutura 3D e Animações)
           ========================================================================== */
        .flashcard-scene {
            width: 100%;
            max-width: 600px;
            height: 500px;
            perspective: 1000px; /* Necessário para o efeito 3D */
            cursor: pointer;
        }

        .flashcard-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform var(--transition-speed);
            transform-style: preserve-3d;
            box-shadow: var(--shadow-lg);
            border-radius: 16px;
        }

        /* Classe ativada via JS para girar o card */
        .flashcard-inner.is-flipped {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background-color: var(--card-bg);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
        }


        .flashcard-front {
        /* Garante que a frente receba cliques normalmente */
            pointer-events: auto;
        }

        .flashcard-inner.is-flipped .flashcard-front {
            pointer-events: none; /* Desativa a frente quando virada para trás */
        }

        .flashcard-back {
            transform: rotateY(180deg);
            background-color: var(--teal-light);

            /* Desativa cliques na parte de trás enquanto ela está escondida */
            pointer-events: none;
        }

        .flashcard-inner.is-flipped .flashcard-back {
            pointer-events: auto; /* Reativa a parte de trás quando virada */
        }

        /* ==========================================================================
           5. CONTEÚDO DO CARD (Mídia e Texto)
           ========================================================================== */
        .card-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .portuguese-text {
            font-size: 2rem;
            color: var(--teal-dark);
            font-weight: bold;
        }

        .libras-video-container {
            width: 100%;
            height: 100%;
            max-height: 350px;
            border-radius: 8px;
            overflow: hidden;
            background-color: var(--text-main);
            position: relative; 
            z-index: 10;
        }

        .flashcard-inner.is-flipped .libras-video-container {
            z-index: 0;
        }

        .libras-video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .prompt-text {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .answer-hint {
            margin-bottom: 1rem;
            font-size: 1rem;
            color: var(--text-tertiary);
        }

        .btn-flip {
            margin-top: 1rem;
            background-color: var(--amber-accent);
            color: white;
            border: none;
            padding: 0.5rem 2rem;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: var(--shadow-md);
            cursor: pointer; /* Modificado: retorna o cursor de clique no botão */
        }
        
        .tags {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        
        .tag {
            background-color: var(--teal-light);
            color: var(--teal-dark);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <h1>Sinalize! 🤟</h1>

    <div class="controls-container">
        <!-- Toggle de Modos -->
        <div class="toggle-container" role="radiogroup" aria-label="Modo de Estudo">
            <button class="toggle-btn active" id="btn-mode-libras" onclick="setMode('libras')">Libras na Frente</button>
            <button class="toggle-btn" id="btn-mode-pt" onclick="setMode('pt')">Português na Frente</button>
        </div>
    </div>

    <!-- Cena 3D do Flashcard -->
    <div class="flashcard-scene" onclick="toggleFlip(event)">
        <div class="flashcard-inner" id="flashcard">
            
            <!-- Face Frontal -->
            <div class="flashcard-face flashcard-front">
                <div class="tags" id="front-tags"></div>
                <div class="card-content" id="front-content">
                    <!-- Injetado via JS -->
                </div>
                <div class="prompt-text" id="front-prompt">
                    <!-- Injetado via JS -->
                </div>
                <button class="btn-flip">Resposta</button>
            </div>

            <!-- Face Traseira -->
            <div class="flashcard-face flashcard-back">
                <div class="answer-hint">Seria algo parecido com isso:</div>
                <div class="card-content" id="back-content">
                    <!-- Injetado via JS -->
                </div>
            </div>

        </div>
    </div>

    <!-- Controles de Navegação -->
    <div class="controls-container">
        <div class="nav-buttons">
            <button class="btn-nav" onclick="prevCard()">Anterior</button>
            <span id="card-counter" style="color: var(--text-secondary); line-height: 40px;">1 / X</span>
            <button class="btn-nav" onclick="nextCard()">Próximo</button>
        </div>
    </div>

    <script>
        /* ==========================================================================
           1. CAMADA DE DADOS (Simulando o JSON externo)
           ========================================================================== */
        const dadosJSON = `[
            {
                "código": 101,
                "português": "Qual o seu nome?",
                "sinais": "https://drive.google.com/file/d/1ArkF_TGGlfbRX79QUY0teq1g24bjABvn/view?usp=sharing",
                "tags": ["Apresentação", "Básico"]
            },
            {
                "código": 102,
                "português": "Prazer em conhecer",
                "sinais": "https://drive.google.com/file/d/18RlTCDdsvMW30pehKvuMHF5SYcaKHe3E/view",
                "tags": ["Apresentação", "Social"]
            }
        ]`;

        const flashcards = JSON.parse(dadosJSON);

        /* ==========================================================================
           2. ESTADO DA APLICAÇÃO
           ========================================================================== */
        const AppState = {
            currentIndex: 0,
            mode: 'libras', // 'libras' | 'pt'
            isFlipped: false
        };

        /* ==========================================================================
           3. UTILITÁRIOS E SANITIZADORES
           ========================================================================== */
        /**
         * Sanitiza URLs do Google Drive para o formato seguro de iFrame (preview)
         * Resolve o problema comum de "Refused to display in a frame because it set 'X-Frame-Options' to 'SAMEORIGIN'"
         */
        function getSafeDriveEmbedUrl(url) {
            try {
                // Tenta extrair o ID usando Expressão Regular (padrão do Google Drive)
                const match = url.match(/\/d\/(.+?)\//);
                if (match && match[1]) {
                    const videoId = match[1];
                    return `https://drive.google.com/file/d/${videoId}/preview`;
                }
                // Fallback de segurança se o regex falhar mas for url do drive
                return url; 
            } catch (e) {
                console.error("Erro ao sanitizar URL de vídeo", e);
                return "";
            }
        }

        /* ==========================================================================
           4. LÓGICA DE RENDERIZAÇÃO
           ========================================================================== */
        
        function renderCard() {
            const card = flashcards[AppState.currentIndex];
            const safeVideoUrl = getSafeDriveEmbedUrl(card.sinais);
            
            const DOM = {
                frontContent: document.getElementById('front-content'),
                frontPrompt: document.getElementById('front-prompt'),
                backContent: document.getElementById('back-content'),
                tags: document.getElementById('front-tags'),
                counter: document.getElementById('card-counter')
            };

            // Renderiza Tags
            DOM.tags.innerHTML = card.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            DOM.counter.innerText = `${AppState.currentIndex + 1} / ${flashcards.length}`;

            // Componentes reutilizáveis
            const videoHTML = `
                <div class="libras-video-container">
                    <iframe src="${safeVideoUrl}" allow="autoplay; encrypted-media" allowfullscreen title="Vídeo em Libras"></iframe>
                </div>`;
            const textHTML = `<div class="portuguese-text">${card.português}</div>`;

            // Aplica a lógica baseada no modo selecionado
            if (AppState.mode === 'libras') {
                // Modo 1: Vídeo na frente, Português atrás
                DOM.frontContent.innerHTML = videoHTML;
                DOM.frontPrompt.innerText = "🤔💭 Pare e Pense: como é em português?";
                DOM.backContent.innerHTML = textHTML;
            } else {
                // Modo 2: Português na frente, Vídeo atrás
                DOM.frontContent.innerHTML = textHTML;
                DOM.frontPrompt.innerText = "🤔💭 Pare e Pense: como é em Libras?";
                DOM.backContent.innerHTML = videoHTML;
            }
        }

        /* ==========================================================================
           5. INTERAÇÕES E CONTROLES
           ========================================================================== */

        function toggleFlip(event) {
            // 1. CHECAGEM DE SEGURANÇA: O clique veio de dentro do vídeo?
            // Se o elemento clicado (target) está dentro da classe '.libras-video-container',
            // nós usamos 'return' para cancelar a função e não virar a carta.
            if (event && event.target.closest('.libras-video-container')) {
                // document.querySelector('[aria-label="Player de vídeo"]').click(); // MUDADO: seleciona o elemento section que está passando o vídeo e imita um clique
                return; 
            }

            // 2. Comportamento normal de virar a carta
            const flashcardElement = document.getElementById('flashcard');
            AppState.isFlipped = !AppState.isFlipped;
    
            if (AppState.isFlipped) {
                flashcardElement.classList.add('is-flipped');
            } else {
                flashcardElement.classList.remove('is-flipped');
            }
        }

        function resetFlipState() {
            AppState.isFlipped = false;
            document.getElementById('flashcard').classList.remove('is-flipped');
        }

        function setMode(mode) {
            if (AppState.mode === mode) return;
            
            AppState.mode = mode;
            
            // Atualiza UI dos botões
            document.getElementById('btn-mode-libras').classList.toggle('active', mode === 'libras');
            document.getElementById('btn-mode-pt').classList.toggle('active', mode === 'pt');
            
            // Se estiver virado, desvira antes de re-renderizar para não bugar visualmente
            if(AppState.isFlipped) {
                resetFlipState();
                // Aguarda a animação de desvirar acabar para trocar o conteúdo
                setTimeout(renderCard, 300);
            } else {
                renderCard();
            }
        }

        function nextCard() {
            if (AppState.currentIndex < flashcards.length - 1) {
                AppState.currentIndex++;
                transitionToNewCard();
            }
        }

        function prevCard() {
            if (AppState.currentIndex > 0) {
                AppState.currentIndex--;
                transitionToNewCard();
            }
        }

        function transitionToNewCard() {
            if (AppState.isFlipped) {
                resetFlipState();
                setTimeout(renderCard, 300);
            } else {
                renderCard();
            }
        }

        // Inicializa a aplicação
        window.onload = () => {
            renderCard();
        };

    </script>
</body>
</html>
